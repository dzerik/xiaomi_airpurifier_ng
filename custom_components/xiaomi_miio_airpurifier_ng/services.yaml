# Fan services
fan_set_buzzer_on:
  name: Set buzzer on
  description: Turn the buzzer on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_buzzer_off:
  name: Set buzzer off
  description: Turn the buzzer off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_led_on:
  name: Set LED on
  description: Turn the LED on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_led_off:
  name: Set LED off
  description: Turn the LED off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_child_lock_on:
  name: Set child lock on
  description: Turn the child lock on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_child_lock_off:
  name: Set child lock off
  description: Turn the child lock off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_favorite_level:
  name: Set favorite level
  description: Set the favorite level.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    level:
      name: Level
      description: Level, between 0 and 16.
      required: true
      selector:
        number:
          min: 0
          max: 16
          mode: slider

fan_set_fan_level:
  name: Set fan level
  description: Set the fan level.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    level:
      name: Level
      description: Level, between 1 and 3.
      required: true
      selector:
        number:
          min: 1
          max: 3
          mode: slider

fan_set_led_brightness:
  name: Set LED brightness
  description: Set the LED brightness.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    brightness:
      name: Brightness
      description: Brightness level.
      required: true
      selector:
        select:
          options:
            - label: Bright
              value: "0"
            - label: Dim
              value: "1"
            - label: "Off"
              value: "2"

fan_set_auto_detect_on:
  name: Set auto detect on
  description: Turn the auto detect on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_auto_detect_off:
  name: Set auto detect off
  description: Turn the auto detect off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_learn_mode_on:
  name: Set learn mode on
  description: Turn the learn mode on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_learn_mode_off:
  name: Set learn mode off
  description: Turn the learn mode off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_volume:
  name: Set volume
  description: Set the sound volume.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    volume:
      name: Volume
      description: Volume, between 0 and 100.
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider

fan_reset_filter:
  name: Reset filter
  description: Reset the filter lifetime and usage.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_extra_features:
  name: Set extra features
  description: Set extra features value.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    features:
      name: Features
      description: Integer value (0 = default, 1 = turbo mode).
      required: true
      selector:
        number:
          min: 0
          max: 1
          mode: box

fan_set_target_humidity:
  name: Set target humidity
  description: Set the target humidity.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    humidity:
      name: Humidity
      description: Target humidity percentage.
      required: true
      selector:
        number:
          min: 30
          max: 80
          step: 10
          mode: slider
          unit_of_measurement: "%"

fan_set_dry_on:
  name: Set dry on
  description: Turn the dry mode on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_dry_off:
  name: Set dry off
  description: Turn the dry mode off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_filters_cleaned:
  name: Set filters cleaned
  description: Inform the device that filters are cleaned.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_motor_speed:
  name: Set motor speed
  description: Set the motor speed RPM.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    motor_speed:
      name: Motor speed
      description: Motor speed in RPM (200-2000).
      required: true
      selector:
        number:
          min: 200
          max: 2000
          step: 10
          mode: slider
          unit_of_measurement: rpm

fan_set_clean_mode_on:
  name: Set clean mode on
  description: Turn the clean mode on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_clean_mode_off:
  name: Set clean mode off
  description: Turn the clean mode off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_wet_protection_on:
  name: Set wet protection on
  description: Turn the wet protection on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_wet_protection_off:
  name: Set wet protection off
  description: Turn the wet protection off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_favorite_speed:
  name: Set favorite speed
  description: Set the favorite speed.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    speed:
      name: Speed
      description: Speed value (60-300).
      required: true
      selector:
        number:
          min: 60
          max: 300
          mode: slider

fan_set_display_on:
  name: Set display on
  description: Turn the display on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_display_off:
  name: Set display off
  description: Turn the display off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_ptc_on:
  name: Set PTC on
  description: Turn the PTC heater on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_ptc_off:
  name: Set PTC off
  description: Turn the PTC heater off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_ptc_level:
  name: Set PTC level
  description: Set the PTC heater level.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    level:
      name: Level
      description: PTC level.
      required: true
      selector:
        select:
          options:
            - Low
            - Medium
            - High

fan_set_display_orientation:
  name: Set display orientation
  description: Set the display orientation.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    display_orientation:
      name: Orientation
      description: Display orientation.
      required: true
      selector:
        select:
          options:
            - Portrait
            - LandscapeLeft
            - LandscapeRight

fan_set_delay_off:
  name: Set delay off
  description: Set the delay off timer.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    delay_off_countdown:
      name: Delay
      description: Delay in minutes (0 to disable).
      required: true
      selector:
        number:
          min: 0
          max: 480
          step: 60
          mode: slider
          unit_of_measurement: min

fan_set_oscillation_angle:
  name: Set oscillation angle
  description: Set the oscillation angle.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan
  fields:
    angle:
      name: Angle
      description: Oscillation angle in degrees.
      required: true
      selector:
        select:
          options:
            - label: "30°"
              value: "30"
            - label: "60°"
              value: "60"
            - label: "90°"
              value: "90"
            - label: "120°"
              value: "120"

fan_set_natural_mode_on:
  name: Set natural mode on
  description: Turn the natural mode on.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

fan_set_natural_mode_off:
  name: Set natural mode off
  description: Turn the natural mode off.
  target:
    entity:
      integration: xiaomi_miio_airpurifier_ng
      domain: fan

